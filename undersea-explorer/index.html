<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>海底探险</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<script src="js/game.js"></script>
<script>
// 兼容微信 X5 内核不支持 dvh：将 window.innerHeight 的 1% 注入为 --vh CSS 变量
(function(){
  function setVh(){
    try{ document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px'); }catch(e){}
  }
  setVh();
  window.addEventListener('resize', setVh);
  window.addEventListener('orientationchange', setVh);
  window.addEventListener('pageshow', setVh);
})();
</script>
</body>
</html>
